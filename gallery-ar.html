<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرض الصور</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<header><img src="images/mosque-logo.png" alt="Logo" class="logo">
        <h1>المركز الاسلامي في تبليتسه</h1>
        <h4>المعرض</h4>
        <div class="top-controls">
            <select class="language-select" onchange="window.location.href=this.value">
                <option value="gallery.html">English</option>
                <option value="gallery-cz.html">Čeština</option>
                <option value="gallery-ar.html" selected>العربية</option>
            </select>
            <button id="theme-btn" class="theme-switcher" onclick="toggleTheme()"></button>
        </div>
    </header>
    <nav>
        <a href="index-ar.html">الرئيسية</a>
        <a href="gallery-ar.html">المعرض</a>
        <a href="contact-ar.html">اتصل بنا</a>
    </nav>
    <main>
        <h2>معرض الصور</h2>
        <p>قريباً: صور لمسجدنا الجميل.</p>
    </main>
    <footer>&copy; 2026 Community Mosque</footer>
<script>
    const btn = document.getElementById("theme-btn");
    function updateBtn() {
        btn.innerHTML = document.documentElement.getAttribute("data-theme") === "light" ? "🌙" : "☀️";
    }
    function toggleTheme() {
        const theme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
        updateBtn();
    }
    // Initialize theme and button
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateBtn();
</script>
</body>
</html>
